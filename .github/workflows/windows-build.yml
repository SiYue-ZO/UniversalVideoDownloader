name: Windows Build

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.6.2'
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2019_64'

      - name: Configure CMake
        # 注意：如果你的 CMakeLists.txt 在子文件夹 M3u8Downloader 里，这里要改路径
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Project
        run: cmake --build build --config Release

      - name: Deploy Qt Dependencies
        shell: pwsh
        run: |
          # 精确查找你的目标 exe，避免抓取到 CMake 的临时文件
          $EXE_PATH = Get-ChildItem -Path build -Filter "UniversalVideoDownloader.exe" -Recurse | Select-Object -First 1
          
          if ($EXE_PATH) {
              Write-Host "成功找到目标程序: $($EXE_PATH.FullName)"
              windeployqt $EXE_PATH.FullName
          } else {
              Write-Error "未找到 UniversalVideoDownloader.exe，请检查编译步骤是否成功！"
              exit 1
          }

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Windows-Downloader-App
          path: build/
